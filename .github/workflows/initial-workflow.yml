name: My Initial workflow
on:
  push:
    branches:
      - 'master'
  workflow_dispatch:
    inputs:
      KushAshtu: 
        description: 'Kush A'
        required: true


jobs:
  testing:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Getting Code
        uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm ci
      - name: Running Steps
        run: npm run test
  build:
    runs-on: ubuntu-latest

    outputs:
      js_file: ${{steps.filinjo.outputs.filename}}
    steps:
      - name: Getting Code
        uses: actions/checkout@v3
      - name: Install Dependencies
        run: npm ci
      - name: Running the build
        run: npm run build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: src-dir
          path: src/
      - name: Add JS Output
        id: filinjo
        run: echo "filename=$(find . -name '*.js' -type f -print -quit)" >> $GITHUB_OUTPUT 
  report:
    runs-on: ubuntu-latest
    needs: [testing, build]
    if: ${{ always()}}
    steps:
      - name: Downloading artifact
        uses: actions/download-artifact@v4
      - name: Run Report
        run: echo "${{ needs.testing.result }}"

