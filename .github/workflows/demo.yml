name: Deploy website
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Build Website
        run: npm run build
      - name: Uploda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path:
             dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install Artifacts
        uses: actions/download-artifact@v4
        with: 
          name: dist-files
      - name: Display Artifacts
        run: ls
      - name: Deploy
        run: echo "Deploying..."

