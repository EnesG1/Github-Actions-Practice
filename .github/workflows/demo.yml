name: Deploy website
on:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**.package-lock.json')}}
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      HTML-file-finder: ${{steps.my-file.outputs.skiqka}}
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**.package-lock.json')}}
      - name: Install dependencies
        run: npm ci
      - name: Build Website
        run: npm run build
      - name: Uploda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-files
          path: src/
      - name: HTML File Finder
        id: my-file
        run: find *.html -type f -execdir echo 'skiqka={}' >> $GITHUB_OUTPUT ';'
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Install Artifacts
        uses: actions/download-artifact@v4
        with: 
          name: source-files
      - name: Display Artifacts
        run: ls -R
      - name: filinjo-name
        run: echo "${{ needs.build.outputs.HTML-file-finder}}"
      - name: Deploy
        run: echo "Deploying..."

